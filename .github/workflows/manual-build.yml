name: Manual Docker Build

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version increment type'
        required: true
        default: 'patch'
        type: choice
        options:
        - patch
        - minor
        - major
        - custom
      custom_version:
        description: 'Custom version (only if version_type is custom)'
        required: false
        type: string
      push_to_dockerhub:
        description: 'Push to Docker Hub'
        required: true
        default: true
        type: boolean

env:
  DOCKER_REGISTRY: docker.io
  DOCKER_USERNAME: deepakdpk6
  IMAGE_NAME: apigee-deployment-manager

jobs:
  manual-build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      if: ${{ inputs.push_to_dockerhub }}
      uses: docker/login-action@v3
      with:
        username: ${{ env.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}
    
    - name: Generate version number
      id: version
      run: |
        BUILD_DATE=$(date -u +'%Y%m%d')
        BUILD_TIME=$(date -u +'%H%M%S')
        COMMIT_SHA=${GITHUB_SHA::8}
        
        if [[ "${{ inputs.version_type }}" == "custom" ]]; then
          VERSION="${{ inputs.custom_version }}"
        else
          # Get the latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"
          
          # Extract version numbers
          VERSION_NUM=${LATEST_TAG#v}
          MAJOR=$(echo $VERSION_NUM | cut -d. -f1)
          MINOR=$(echo $VERSION_NUM | cut -d. -f2)
          PATCH=$(echo $VERSION_NUM | cut -d. -f3)
          
          # Increment based on type
          case "${{ inputs.version_type }}" in
            "major")
              NEW_MAJOR=$((MAJOR + 1))
              VERSION="v${NEW_MAJOR}.0.0"
              ;;
            "minor")
              NEW_MINOR=$((MINOR + 1))
              VERSION="v${MAJOR}.${NEW_MINOR}.0"
              ;;
            "patch")
              NEW_PATCH=$((PATCH + 1))
              VERSION="v${MAJOR}.${MINOR}.${NEW_PATCH}"
              ;;
          esac
        fi
        
        echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
        echo "BUILD_DATE=${BUILD_DATE}" >> $GITHUB_OUTPUT
        echo "COMMIT_SHA=${COMMIT_SHA}" >> $GITHUB_OUTPUT
        
        if [[ "${{ inputs.push_to_dockerhub }}" == "true" ]]; then
          echo "TAGS=${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${VERSION},${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_OUTPUT
        else
          echo "TAGS=${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${VERSION}" >> $GITHUB_OUTPUT
        fi
        
        echo "Generated version: $VERSION"
    
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64,linux/arm64
        push: ${{ inputs.push_to_dockerhub }}
        tags: ${{ steps.version.outputs.TAGS }}
        build-args: |
          BUILD_DATE=${{ steps.version.outputs.BUILD_DATE }}
          BUILD_VERSION=${{ steps.version.outputs.VERSION }}
          COMMIT_SHA=${{ steps.version.outputs.COMMIT_SHA }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Create Git tag
      if: ${{ inputs.push_to_dockerhub }}
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git tag ${{ steps.version.outputs.VERSION }}
        git push origin ${{ steps.version.outputs.VERSION }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build summary
      run: |
        echo "## 🎉 Manual Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| **Version** | \`${{ steps.version.outputs.VERSION }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| **Version Type** | ${{ inputs.version_type }} |" >> $GITHUB_STEP_SUMMARY
        echo "| **Docker Tags** | \`${{ steps.version.outputs.TAGS }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| **Pushed to Docker Hub** | ${{ inputs.push_to_dockerhub }} |" >> $GITHUB_STEP_SUMMARY
        echo "| **Build Date** | ${{ steps.version.outputs.BUILD_DATE }} |" >> $GITHUB_STEP_SUMMARY
        echo "| **Commit SHA** | \`${{ steps.version.outputs.COMMIT_SHA }}\` |" >> $GITHUB_STEP_SUMMARY
